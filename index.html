<!DOCTYPE html>
<html lang="id"
<head>
    <meta charset="=UTF-8"
    <title>Kantin - kasir Mini</title>

    <!-- BAGIAN CSS: Mengatur tata letak dan keindahan halaman web -->
     <style>
        /* Mengatur tampilan font dasar dan warna latar belakang halaman */
        body {
            font-family: sans-serif;
            background-color: #f4f6f9;
            padding: 20px;
            margin: 0;
        }

        /* Mengatur lebar maksimal halaman agar konten berada di tengah layar */
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Mengatur kotak judul atas (Header) */
        header {
            text-align: center;
            background-color: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Mengatur tata letak utama menjadi 2 kolom menggunakan CSS Grid */
        /* Kolom kiri berukuran 350px (Form), kolom kanan menghabiskan sisa layar (Etalase) */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* Mengatur kotak panel input di sebelah kiri */
        .form-panel {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content;
        }

        /* Memberikan jarak antar-kelompok input */
        .form-group {
            margin-bottom: 15px;
        }

        /* mengatur teks label petunjuk di atas kotak input */
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Mengatur ukuran kotak input teks, angka, dan pilihan */
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Mengatur tampilan tombol simpan menjadi berwarna hijau */
        .btn-simpan {
            width: 100%;
            padding: 10px;
            background-color: #2ecc71;
            color: #ffffff;
            border: none;
            border-radius: bold;
            cursor: pointer;

        }

        /* Mengatur area etalase di sebelah kanan agar kartu produk otomatis berbaris rapi */
        .etalase-panel {
            display: grid;
            grid-template-columns: repeat(auto-fill, minimax(200px, 1fr));
            gap: 20px;
        }

        /* Mengatur kotak pembungkus untuk satu kartu produk makanan */
        .card-menu {
            background-color: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* Mengatur ukuran gambar produk di dalam kartu */
        .card-menu img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }
     </style>
</head>
